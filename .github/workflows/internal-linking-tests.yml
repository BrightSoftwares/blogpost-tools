name: internal-linking-tests

# Fast, hermetic unit tests for internal-linking/ (Python).
# GitHub-hosted only — no self-hosted runner, no Docker, no external services.
# NOTE: intentionally NOT path-filtered — this is a REQUIRED status check, and a
# skipped required check blocks PRs forever ("Waiting for status"). It is cheap
# enough (~1-2 min) to run on every PR regardless of what changed.
on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: il-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: internal-linking
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: internal-linking/requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Cache spaCy model (en_core_web_sm)
        id: spacy-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/spacy-models
          key: spacy-en-core-web-sm-${{ runner.os }}-py3.12

      - name: Download en_core_web_sm (if not cached)
        run: |
          if [ ! -d "$HOME/.cache/spacy-models" ] || [ -z "$(ls -A $HOME/.cache/spacy-models 2>/dev/null)" ]; then
            mkdir -p "$HOME/.cache/spacy-models"
            python -m spacy download en_core_web_sm --no-deps -d "$HOME/.cache/spacy-models" \
              || python -m spacy download en_core_web_sm
          fi
          python -c "import en_core_web_sm" 2>/dev/null || python -m spacy download en_core_web_sm

      - name: Verify spaCy model loads (fail loudly if keyword tests would silently skip)
        run: |
          python - <<'PY'
          import spacy
          spacy.load("en_core_web_sm")
          print("en_core_web_sm loaded OK — keyword tests will RUN, not skip.")
          PY

      - name: Run unit tests
        run: pytest tests -v --tb=short
