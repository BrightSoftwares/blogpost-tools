name: Build and publish the duplicati image

on:
  workflow_dispatch:
  push:
    paths:
      - 'duplicati-backup/**'
      
      
jobs:
  build-and-publish-seo-analysis:
    runs-on: "${{ vars.RUNNER_LABEL || 'self-hosted' }}"
    steps:
      - uses: actions/checkout@v3

  docker:
    uses: BrightSoftwares/blogpost-tools/.github/workflows/build_and_publish_docker.yml@main
    with:
      image_name: bright-duplicati
      tag: latest
      subfolder_name: duplicati-backup
      dockerfile_name: Dockerfile.duplicati
    secrets:
      registry_username: ${{ secrets.DOCKER_USERNAME }}
      registry_password: ${{ secrets.DOCKER_PASSWORD }}
# ⚠️ HOME LAB TOOL — Duplicati backup runs in the home lab (Proxmox VM).
# This build workflow is safe on GitHub-hosted for the Docker build step only.
# Any workflow that DEPLOYS or TESTS against the running Duplicati instance must stay on self-hosted.
