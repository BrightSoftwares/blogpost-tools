name: Build and publish the Jekyll Action image

# Heavy Docker image build — NON-BLOCKING, decoupled from merge gating.
# Manual + weekly only (was firing-and-failing on every push via a stuck
# self-hosted runner). The self-hosted file-existence-check job (and its
# `needs:` link) has been dropped along with the push trigger — the docker
# build step itself already fails if these files are missing.
on:
  workflow_dispatch:
  schedule:
    - cron: '45 5 * * 1'   # Mondays 05:45 UTC — periodic image refresh

jobs:
  docker:
    uses: BrightSoftwares/blogpost-tools/.github/workflows/build_and_publish_docker.yml@main
    with:
      image_name: jekyll-action
      tag: latest
      subfolder_name: jekyll-action
      dockerfile_name: Dockerfile
    secrets:
      registry_username: ${{ secrets.DOCKER_USERNAME }}
      registry_password: ${{ secrets.DOCKER_PASSWORD }}
