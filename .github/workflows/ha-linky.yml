name: Build and publish the ha-linky image

on:
  workflow_dispatch:
  push:
    paths:
      - 'ha-linky/**'
      
      
jobs:
  checkout-code:
    runs-on: "${{ vars.RUNNER_LABEL || 'self-hosted' }}"
    steps:
      - uses: actions/checkout@v3

  build-and-publish-docker:
    uses: BrightSoftwares/blogpost-tools/.github/workflows/build_and_publish_docker.yml@main
    with:
      image_name: ha-linky
      tag: latest
      subfolder_name: ha-linky
      dockerfile_name: standalone.Dockerfile
    secrets:
      registry_username: ${{ secrets.DOCKER_USERNAME }}
      registry_password: ${{ secrets.DOCKER_PASSWORD }}
# ⚠️ HOME LAB TOOL — This Docker image is deployed to Proxmox/home-lab infrastructure.
# While the build step can technically run on GitHub-hosted runners, keep it on self-hosted
# to avoid network issues if the image is tested against home lab services during build.
# DO NOT blindly migrate runs-on without verifying no home-lab network calls are made.
