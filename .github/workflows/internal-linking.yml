name: Build and publish the internal linking image

# Heavy Docker image build — NON-BLOCKING, decoupled from merge gating.
# Was firing-and-failing on every push to internal-linking/** via a stuck
# self-hosted runner. Now: manual + weekly only. Unit-test gating lives in
# internal-linking-tests.yml (GitHub-hosted, required).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'   # Mondays 04:00 UTC — periodic image refresh

jobs:
  docker:
    uses: BrightSoftwares/blogpost-tools/.github/workflows/build_and_publish_docker.yml@main
    with:
      image_name: internal-linking
      tag: latest
      subfolder_name: internal-linking
      dockerfile_name: Dockerfile.internal-linking
    secrets:
      registry_username: ${{ secrets.DOCKER_USERNAME }}
      registry_password: ${{ secrets.DOCKER_PASSWORD }}
