name: Social Publish (reusable)

on:
  workflow_call:
    inputs:
      drafts_dir:
        type: string
        default: "_social_drafts/"
      published_dir:
        type: string
        default: "_social_published/"
      schedule_path:
        type: string
        default: "_data/social_schedule.yml"
      config_path:
        type: string
        default: "_data/social_config.yml"
      dry_run:
        type: boolean
        default: false
    secrets:
      LINKEDIN_ACCESS_TOKEN:
        required: true
      LINKEDIN_ORG_URN:
        required: true
      FACEBOOK_PAGE_ACCESS_TOKEN:
        required: true
      FACEBOOK_PAGE_ID:
        required: true
    outputs:
      published_count:
        description: "Number of posts successfully published"
        value: ${{ jobs.publish.outputs.published_count }}
      published_slugs:
        description: "Comma-separated list of published slugs"
        value: ${{ jobs.publish.outputs.published_slugs }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      published_count: ${{ steps.pub.outputs.published_count }}
      published_slugs: ${{ steps.pub.outputs.published_slugs }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r ${{ github.action_path }}/scripts/social/requirements.txt

      - name: Publish approved drafts
        id: pub
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          python ${{ github.action_path }}/scripts/social/publish_main.py \
            --drafts-dir "${{ inputs.drafts_dir }}" \
            --published-dir "${{ inputs.published_dir }}" \
            --schedule-path "${{ inputs.schedule_path }}" \
            ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.published_dir }}" "${{ inputs.schedule_path }}" social-calendar.md || true
          git diff --staged --quiet || git commit -m "social: publish $(find ${{ inputs.published_dir }} -name '*.yml' 2>/dev/null | wc -l | tr -d ' ') post(s) [skip ci]"
          git push
