name: Reusable SEO Index Check

on:
  workflow_call:
    inputs:
      site_url:
        required: true
        type: string
        description: "Base URL of the site to check (e.g. https://bright-softwares.com)"
      sitemap_path:
        required: false
        type: string
        default: "/sitemap.xml"
      output_dir:
        required: false
        type: string
        default: "_seo_reports"
      limit:
        required: false
        type: number
        default: 0
        description: "Process at most N sitemap URLs (0 = no limit)"
      commit_changes:
        required: false
        type: boolean
        default: true
    secrets:
      GH_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      site_url:
        required: true
        type: string
      sitemap_path:
        required: false
        type: string
        default: "/sitemap.xml"
      output_dir:
        required: false
        type: string
        default: "_seo_reports"
      limit:
        required: false
        type: number
        default: 0
      commit_changes:
        required: false
        type: boolean
        default: true

jobs:
  seo-index-check:
    runs-on: "${{ vars.RUNNER_LABEL || 'self-hosted' }}"
    timeout-minutes: 30
    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v7

      - name: Checkout blogpost-tools
        uses: actions/checkout@v7
        with:
          repository: BrightSoftwares/blogpost-tools
          path: .blogpost-tools
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r .blogpost-tools/seo-index-checker/requirements.txt

      - name: Run SEO index checker
        run: |
          LIMIT_ARG=""
          if [ "${{ inputs.limit }}" != "0" ]; then
            LIMIT_ARG="--limit ${{ inputs.limit }}"
          fi
          python .blogpost-tools/seo-index-checker/src/seo_index_checker.py \
            --site-url "${{ inputs.site_url }}" \
            --sitemap-path "${{ inputs.sitemap_path }}" \
            --output-dir "${{ inputs.output_dir }}" \
            $LIMIT_ARG

      - name: Commit and push report
        if: inputs.commit_changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.output_dir }}"
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(seo): index-check report for ${{ inputs.site_url }}"
            git push
          fi

      - name: Cleanup
        if: always()
        run: rm -rf .blogpost-tools
