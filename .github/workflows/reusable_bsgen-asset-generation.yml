name: Reusable — bsgen Asset Generation (LinkedIn Composer)

# ---------------------------------------------------------------------------
# Reusable workflow: given a markdown file containing ```bsgen:asset blocks,
# builds the LinkedIn Composer Next.js server locally, renders each block
# via POST /api/carousel/render, uploads results to Cloudinary (or saves
# PNGs inline), and publishes the manifest as an artifact.
#
# Callers:
#   BrightSoftwares/corporate-website  — generate-bsgen-assets.yml
#   (other Jekyll websites in future)
# ---------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      markdown_file:
        description: "Repo-relative path to the markdown file with bsgen:asset blocks"
        required: true
        type: string
      output_dir:
        description: "Directory to write output files (manifest + optional PNGs)"
        required: false
        type: string
        default: "bsgen-output"
      storage:
        description: "Storage mode: 'cloudinary' (uploads to CDN) or 'inline' (saves local PNGs)"
        required: false
        type: string
        default: "cloudinary"
      artifact_name:
        description: "GitHub Actions artifact name"
        required: false
        type: string
        default: "bsgen-assets"
      artifact_retention_days:
        required: false
        type: number
        default: 14
      node_version:
        required: false
        type: string
        default: "20"
      linkedin_composer_ref:
        description: "Git ref to checkout from BrightSoftwares/linkedin-composer"
        required: false
        type: string
        default: "main"
    secrets:
      LC_API_KEY:
        description: "LINKEDIN_COMPOSER_API_KEY — static Bearer token for the LC server"
        required: true
      CLOUDINARY_CLOUD_NAME:
        required: false
      CLOUDINARY_API_KEY:
        required: false
      CLOUDINARY_API_SECRET:
        required: false
      GH_PAT:
        description: "GitHub PAT with repo:read scope to clone linkedin-composer (falls back to GITHUB_TOKEN)"
        required: false
    outputs:
      asset_count:
        description: "Number of assets successfully rendered"
        value: ${{ jobs.render.outputs.asset_count }}
      artifact_name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.render.outputs.artifact_name }}

jobs:
  render:
    name: Build LC and render bsgen assets
    runs-on: ubuntu-latest
    outputs:
      asset_count: ${{ steps.verify.outputs.asset_count }}
      artifact_name: ${{ inputs.artifact_name }}
    env:
      LINKEDIN_COMPOSER_API_KEY: ${{ secrets.LC_API_KEY }}
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

    steps:
      - name: Checkout caller repo (for markdown file)
        uses: actions/checkout@v4

      - name: Checkout LinkedIn Composer
        uses: actions/checkout@v4
        with:
          repository: BrightSoftwares/linkedin-composer
          ref: ${{ inputs.linkedin_composer_ref }}
          path: _lc
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: _lc/package-lock.json

      - name: Install LinkedIn Composer dependencies
        working-directory: _lc
        run: npm ci

      - name: Install Playwright browsers
        working-directory: _lc
        run: npx playwright install chromium --with-deps

      - name: Build LinkedIn Composer
        working-directory: _lc
        run: npm run build

      - name: Start LinkedIn Composer server
        working-directory: _lc
        run: |
          npm run start &
          echo $! > /tmp/lc-server.pid
          for i in $(seq 1 30); do
            STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null)
            if echo "$STATUS" | grep -qE "^[23]"; then
              echo "[bsgen] LC server ready (status=$STATUS, attempt=$i)"
              break
            fi
            echo "[bsgen] waiting for server... ($i/30)"
            sleep 2
          done

      - name: Render bsgen blocks
        run: |
          node _lc/scripts/render-bsgen.mjs "${{ inputs.markdown_file }}" \
            --out "${{ inputs.output_dir }}" \
            --api-url http://localhost:3000 \
            --storage "${{ inputs.storage }}" \
            --api-key "$LINKEDIN_COMPOSER_API_KEY"

      - name: Verify output
        id: verify
        run: |
          echo "=== Manifest ==="
          cat "${{ inputs.output_dir }}/bsgen-manifest.json" 2>/dev/null || echo "(not found)"
          COUNT=$(python3 -c "
          import json
          try:
              data = json.load(open('${{ inputs.output_dir }}/bsgen-manifest.json'))
              print(len([e for e in data if e.get('status') == 'ok']))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")
          echo "asset_count=$COUNT" >> $GITHUB_OUTPUT
          echo "[bsgen] $COUNT asset(s) rendered."
          [ "$COUNT" -gt "0" ] || echo "::warning::No assets rendered for ${{ inputs.markdown_file }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.output_dir }}/
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: warn
