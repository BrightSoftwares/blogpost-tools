name: Reusable — bsgen Asset Generation (LinkedIn Composer)

# ---------------------------------------------------------------------------
# Reusable workflow: clones linkedin-composer, builds the Next.js server
# inside the runner, renders each ```bsgen:asset block to a PNG via the
# local carousel API, then saves PNGs inline or uploads to Cloudinary.
#
# Why local build (not the Vercel deployment):
#   Vercel Hobby functions have a 10s execution limit and cannot download
#   the Playwright Chromium binary at runtime. The local build approach
#   runs reliably in ~4 min on ubuntu-latest.
#
# Callers:
#   BrightSoftwares/corporate-website  — generate-bsgen-assets.yml
#   (other Jekyll websites)
# ---------------------------------------------------------------------------

on:
  workflow_call:
    inputs:
      markdown_file:
        description: "Repo-relative path to the markdown file with bsgen:asset blocks"
        required: true
        type: string
      output_dir:
        description: "Directory to write output (manifest + optional PNGs)"
        required: false
        type: string
        default: "bsgen-output"
      storage:
        description: "'cloudinary' uploads to CDN; 'inline' saves PNGs as artifact"
        required: false
        type: string
        default: "cloudinary"
      linkedin_composer_ref:
        description: "Branch/tag/SHA to check out from BrightSoftwares/linkedin-composer"
        required: false
        type: string
        default: "main"
      artifact_name:
        required: false
        type: string
        default: "bsgen-assets"
      artifact_retention_days:
        required: false
        type: number
        default: 14
    secrets:
      LC_API_KEY:
        description: "Bearer token — must match LINKEDIN_COMPOSER_API_KEY on the LC server"
        required: true
      GH_PAT:
        description: "GitHub PAT (repo read) to clone BrightSoftwares/linkedin-composer"
        required: true
      CLOUDINARY_CLOUD_NAME:
        required: false
      CLOUDINARY_API_KEY:
        required: false
      CLOUDINARY_API_SECRET:
        required: false
    outputs:
      asset_count:
        description: "Number of assets successfully rendered"
        value: ${{ jobs.render.outputs.asset_count }}

jobs:
  render:
    name: Build LC and render bsgen assets
    runs-on: ubuntu-latest
    outputs:
      asset_count: ${{ steps.verify.outputs.asset_count }}
    env:
      LINKEDIN_COMPOSER_API_KEY: ${{ secrets.LC_API_KEY }}
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

    steps:
      - name: Checkout caller repo (contains the markdown file)
        uses: actions/checkout@v4

      - name: Checkout LinkedIn Composer
        uses: actions/checkout@v4
        with:
          repository: BrightSoftwares/linkedin-composer
          ref: ${{ inputs.linkedin_composer_ref }}
          path: _lc
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: _lc/package-lock.json

      - name: Install dependencies
        working-directory: _lc
        run: npm ci

      - name: Install Playwright browsers
        working-directory: _lc
        run: npx playwright install chromium --with-deps

      - name: Build LinkedIn Composer
        working-directory: _lc
        run: npm run build

      - name: Start LinkedIn Composer server
        working-directory: _lc
        run: |
          npm run start &
          for i in $(seq 1 30); do
            STATUS=$(curl -so /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
            if echo "$STATUS" | grep -qE "^[23]"; then
              echo "[bsgen] LC server ready (status=$STATUS, attempt=$i)"; break
            fi
            echo "[bsgen] waiting... ($i/30, status=$STATUS)"; sleep 2
          done

      - name: Check Cloudinary config (cloudinary mode only)
        if: ${{ inputs.storage == 'cloudinary' }}
        run: |
          MISSING=""
          [ -z "$CLOUDINARY_CLOUD_NAME" ] && MISSING="$MISSING CLOUDINARY_CLOUD_NAME"
          [ -z "$CLOUDINARY_API_KEY"    ] && MISSING="$MISSING CLOUDINARY_API_KEY"
          [ -z "$CLOUDINARY_API_SECRET" ] && MISSING="$MISSING CLOUDINARY_API_SECRET"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing Cloudinary secrets:$MISSING — images will NOT upload to Cloudinary."
            echo "Add these as repository secrets and forward them in the caller workflow."
            exit 1
          fi
          echo "[bsgen] Cloudinary secrets present (cloud_name=${CLOUDINARY_CLOUD_NAME})"

      - name: Render bsgen blocks
        run: |
          node _lc/scripts/render-bsgen.mjs "${{ inputs.markdown_file }}" \
            --out "${{ inputs.output_dir }}" \
            --api-url http://localhost:3000 \
            --storage "${{ inputs.storage }}" \
            --api-key "$LINKEDIN_COMPOSER_API_KEY"

      - name: Verify output
        id: verify
        run: |
          echo "=== bsgen-manifest.json ==="
          python3 -m json.tool "${{ inputs.output_dir }}/bsgen-manifest.json" 2>/dev/null || \
            cat "${{ inputs.output_dir }}/bsgen-manifest.json" 2>/dev/null || echo "(not found)"
          COUNT=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('${{ inputs.output_dir }}/bsgen-manifest.json'))
              ok = [e for e in data if e.get('status') == 'ok']
              errs = [e for e in data if e.get('status') == 'error']
              print(len(ok))
              if errs:
                  print(f'::warning::{len(errs)} block(s) failed: ' +
                        ', '.join(e[\"id\"] + \" — \" + e.get(\"error\",\"\")[:80] for e in errs),
                        file=sys.stderr)
          except Exception as ex:
              print(0)
              print(f'::warning::Could not parse manifest: {ex}', file=sys.stderr)
          " 2>&1 | tee /dev/stderr | head -1 || echo "0")
          echo "asset_count=$COUNT" >> $GITHUB_OUTPUT
          echo "[bsgen] $COUNT asset(s) rendered."
          [ "$COUNT" -gt "0" ] || echo "::warning::No assets rendered for ${{ inputs.markdown_file }}"

      - name: Write Cloudinary URLs back into markdown (cloudinary mode)
        if: ${{ inputs.storage == 'cloudinary' && steps.verify.outputs.asset_count > 0 }}
        env:
          MARKDOWN_FILE: ${{ inputs.markdown_file }}
          OUTPUT_DIR: ${{ inputs.output_dir }}
        run: |
          python3 << 'PYEOF'
          import json, re, os
          from pathlib import Path

          md_path = Path(os.environ["MARKDOWN_FILE"])
          manifest_path = Path(os.environ["OUTPUT_DIR"]) / "bsgen-manifest.json"

          try:
              manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          except Exception as e:
              print(f"[bsgen] Cannot read manifest: {e}")
              raise SystemExit(0)

          url_map = {
              e["id"]: e["cloudinaryUrl"]
              for e in manifest
              if e.get("status") == "ok" and e.get("cloudinaryUrl")
          }
          if not url_map:
              print("[bsgen] No successful Cloudinary uploads to write back.")
              raise SystemExit(0)

          if not md_path.exists():
              print(f"[bsgen] Markdown file not found: {md_path}")
              raise SystemExit(0)

          original = md_path.read_text(encoding="utf-8")

          def patch_block(m):
              content = m.group(1)
              id_m = re.search(r'^id:\s*(\S+)', content, re.MULTILINE)
              if not id_m:
                  return m.group(0)
              block_id = id_m.group(1).strip('"\'')
              url = url_map.get(block_id)
              if not url:
                  return m.group(0)
              # Remove any existing generated_url line and append fresh
              content = re.sub(r'\ngenerated_url:[^\n]*', '', content)
              content = content.rstrip('\n') + f'\ngenerated_url: "{url}"\n'
              return f'```bsgen:asset\n{content}```'

          updated = re.sub(r'```bsgen:asset\s*\n([\s\S]*?)```', patch_block, original)

          if updated == original:
              print("[bsgen] No changes — URLs may already be present.")
              raise SystemExit(0)

          md_path.write_text(updated, encoding="utf-8")
          count = len(url_map)
          print(f"[bsgen] Wrote {count} Cloudinary URL(s) into {md_path}")
          PYEOF

      - name: Commit Cloudinary URLs to caller repo (cloudinary mode)
        if: ${{ inputs.storage == 'cloudinary' && steps.verify.outputs.asset_count > 0 }}
        env:
          MARKDOWN_FILE: ${{ inputs.markdown_file }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$MARKDOWN_FILE"
          if git diff --staged --quiet; then
            echo "[bsgen] Nothing to commit (no URL changes in $MARKDOWN_FILE)."
            exit 0
          fi
          SHORT=$(basename "$MARKDOWN_FILE")
          git commit -m "chore(bsgen): embed Cloudinary asset URLs — ${SHORT}"
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          for attempt in 1 2 3; do
            if git push origin HEAD; then
              echo "[bsgen] Pushed to ${BRANCH}."
              break
            fi
            echo "[bsgen] Push conflict, rebasing (attempt ${attempt}/3)..."
            git pull --rebase origin "$BRANCH"
            sleep $((attempt * 3))
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.output_dir }}/
          retention-days: ${{ inputs.artifact_retention_days }}
          if-no-files-found: warn
