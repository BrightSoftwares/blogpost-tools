name: Build and publish the translate-blogpost image

# Heavy Docker image build — NON-BLOCKING, decoupled from merge gating.
# Manual + weekly only (was firing-and-failing on every push via a stuck
# self-hosted runner).
on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 1'   # Mondays 04:30 UTC — periodic image refresh

jobs:
  docker:
    uses: BrightSoftwares/blogpost-tools/.github/workflows/build_and_publish_docker.yml@main
    with:
      image_name: translate-blogpost
      tag: latest
      subfolder_name: translate-blogpost
      dockerfile_name: Dockerfile.translate-blogpost
    secrets:
      registry_username: ${{ secrets.DOCKER_USERNAME }}
      registry_password: ${{ secrets.DOCKER_PASSWORD }}
