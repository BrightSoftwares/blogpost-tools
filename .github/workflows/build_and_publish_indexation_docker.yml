name: Build and publish the Indexation Issues analyzer image

# Heavy Docker image build — NON-BLOCKING, decoupled from merge gating.
# Manual + weekly only (was firing-and-failing on every push via a stuck
# self-hosted runner). The self-hosted validation job (and its `needs:` link)
# has been dropped along with the push trigger.
on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * 1'   # Mondays 05:30 UTC — periodic image refresh

jobs:
  docker:
    uses: BrightSoftwares/blogpost-tools/.github/workflows/build_and_publish_docker.yml@main
    with:
      image_name: indexationanalyzer
      tag: latest
      subfolder_name: indexation-issues
      dockerfile_name: Dockerfile.indexationanalyzer
    secrets:
      registry_username: ${{ secrets.DOCKER_USERNAME }}
      registry_password: ${{ secrets.DOCKER_PASSWORD }}
